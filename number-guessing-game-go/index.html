<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="card">
    <form action="/guess" method="post">
        <h4>I'm thinking of a number...</h4>
        <label for="guessnum">Can you tell what number it is?</label>
        <input type="number" min="1" max="100" name="guessnum" autofocus autocomplete="off">
        <button type="submit">Guess</button>
         {{if .Response}}
        <div class="resp-section">
        {{.Response}}
        </div>
        {{end}}
    </form>
</div>
</body>
</html>
